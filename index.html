<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click Store | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === الألوان (Dark Neon) === */
        :root {
            --bg-main: #07070a; --bg-card: rgba(20, 20, 30, 0.7);
            --primary: #8b5cf6; --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #d946ef; --text-main: #ffffff;
            --text-sub: #9ca3af; --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 100px; }

        /* === شريط التنقل العلوي === */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(7, 7, 10, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .nav-brand { font-size: 1.5rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .lang-btn { background: none; border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .nav-cart-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; width: 45px; height: 45px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer; position: relative;
        }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: var(--accent);
            color: #fff; font-size: 0.75rem; font-weight: bold;
            width: 20px; height: 20px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
        }

        .hero { text-align: center; padding: 100px 20px 40px; }
        .hero h1 { font-size: 2.2rem; font-weight: 900; line-height: 1.3; margin-bottom: 10px; }

        /* === شبكة المنتجات === */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; display: grid; gap: 15px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 768px) { .container { grid-template-columns: repeat(4, 1fr); } }

        /* === بطاقة المنتج === */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 12px; display: flex; flex-direction: column;
            position: relative; transition: transform 0.2s;
        }
        .card:active { transform: scale(0.96); border-color: var(--primary); }
        
        .img-box { width: 100%; aspect-ratio: 1/1; border-radius: 14px; overflow: hidden; position: relative; margin-bottom: 12px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* === ختم نفذت الكمية (المطابق للصورة) === */
        .sold-out-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .sold-out-stamp {
            color: #ef4444; font-weight: 900; font-size: 1.3rem;
            padding: 5px 15px; border: 3px solid #ef4444; border-radius: 8px;
            transform: rotate(-15deg); background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); text-shadow: 0 0 5px #ef4444;
        }

        .prod-title { font-weight: 800; font-size: 0.95rem; color: #fff; margin-bottom: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .variant-select {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 10px;
            color: #fff; outline: none; margin-bottom: 12px; font-weight: 600; text-align: center;
        }
        .variant-select:focus { border-color: var(--primary); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price-tag { font-weight: 800; color: var(--accent); font-size: 1.1rem; }
        .btn-add {
            background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid var(--border); width: 40px; height: 40px;
            border-radius: 12px; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-add:active { background: var(--primary); border-color: var(--primary); }

        /* === زر الواتساب العائم === */
        .float-wa {
            position: fixed; bottom: 20px; left: 20px; background: #25D366; color: white;
            width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 2rem; box-shadow: 0 0 20px rgba(37, 211, 102, 0.5); z-index: 999; text-decoration: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37,211,102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37,211,102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37,211,102, 0); } }

        /* === نافذة الدفع (المودال) === */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 2000; display: none; justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: #111116; width: 100%; max-width: 500px;
            border-radius: 25px 25px 0 0; padding: 25px; border-top: 2px solid var(--primary);
            max-height: 90vh; overflow-y: auto;
        }
        
        .payment-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .payment-selector { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 8px; outline: none; margin-bottom: 10px; font-size: 1rem; }
        
        .alert-box { padding: 10px; border-radius: 8px; font-size: 0.85rem; display: none; margin-top: 10px; }
        .alert-flexy { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #fca5a5; }
        .alert-crypto { background: rgba(234, 179, 8, 0.1); border: 1px solid #eab308; color: #fde047; }
        
        .input-style { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; margin-bottom: 15px; }
        .btn-checkout { width: 100%; padding: 15px; background: #25D366; color: #fff; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }

        /* === لوحة الإدارة === */
        #adminView { display: none; padding: 100px 20px; }
        .admin-table { width: 100%; border-collapse: collapse; background: var(--bg-card); color: white; }
        .admin-table th, .admin-table td { padding: 10px; border: 1px solid var(--border); text-align: center; }
        .loader { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; grid-column: 1/-1; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="storeView">
        <nav class="navbar">
            <div class="nav-brand">Click Store</div>
            <div class="nav-actions">
                <button class="lang-btn"><i class="fas fa-globe"></i> AR</button>
                <div class="nav-cart-btn" onclick="openCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <div class="cart-badge" id="cartCount">0</div>
                </div>
            </div>
        </nav>

        <div class="hero">
            <h1>اكتشف عالم<br><span style="color: var(--primary);">الاشتراكات الرقمية</span></h1>
            <p style="color:var(--text-sub)">خدمة فورية، أسعار تنافسية، وضمان كامل.</p>
        </div>

        <div class="container" id="productsGrid">
            <div class="loader"></div>
        </div>

        <a href="https://wa.me/213696357483" class="float-wa" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <div id="adminView">
        <h2 style="color:var(--primary); margin-bottom:20px;">🛡️ لوحة الإدارة (Admin)</h2>
        <table class="admin-table">
            <thead><tr><th>المنتج</th><th>الحالة</th><th>السعر الأساسي</th></tr></thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2 style="font-weight:900;">🛒 سلة المشتريات</h2>
                <button onclick="closeCart()" style="background:none; border:none; color:#fff; font-size:1.5rem;">&times;</button>
            </div>

            <div id="cartItems" style="max-height: 150px; overflow-y: auto; margin-bottom:15px;"></div>

            <div class="payment-box">
                <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.2rem; margin-bottom:15px;">
                    <span>الإجمالي:</span>
                    <span style="color:var(--accent)" id="cartTotal">0 دج</span>
                </div>

                <label style="color:#9ca3af; font-size:0.9rem;">اختر طريقة الدفع:</label>
                <select id="payMethod" class="payment-selector" onchange="calcTotal()">
                    <option value="ccp">BaridiMob / CCP</option>
                    <option value="binance">Binance (USDT)</option>
                    <option value="redotpay">RedotPay (USDT)</option>
                    <option value="flexy">Flexy (فليكسي)</option>
                </select>

                <div id="alertFlexy" class="alert-box alert-flexy">⚠️ تنبيه: تم إضافة 20% رسوم تحويل فليكسي.</div>
                <div id="alertCrypto" class="alert-box alert-crypto">💵 1 دولار = 250 دج</div>

                <div id="payDetails" style="margin-top:10px; font-size:0.85rem; color:#fff; background:#000; padding:10px; border-radius:8px;">
                    </div>
            </div>

            <input type="tel" id="clientPhone" class="input-style" placeholder="رقم هاتفك (مثال: 055...)">
            <input type="text" id="receiptLink" class="input-style" placeholder="رابط صورة الوصل (اختياري)">
            
            <button onclick="checkout()" class="btn-checkout"><i class="fab fa-whatsapp"></i> تأكيد وإرسال الطلب</button>
        </div>
    </div>

    <script>
        const GITHUB_USER = "Store1hjj";
        const GITHUB_REPO = "Click-store-";
        const ADMIN_PHONE = "213696357483"; 
        
        let products = [];
        let cart = [];
        let baseTotal = 0;

        // التحقق من الآدمن
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'Kx9_Admin_Pro_Secret_2026_vX';

        if(isAdmin) {
            document.getElementById('storeView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
        }

        // جلب المنتجات
        async function fetchProducts() {
            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/products.json?v=${new Date().getTime()}`;
                const response = await fetch(url);
                if(response.ok) {
                    products = await response.json();
                    if(isAdmin) renderAdmin(); else renderProducts();
                }
            } catch(error) { console.error(error); }
        }

        // رسم المنتجات في المتجر
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            products.forEach(prod => {
                const isActive = prod.active !== false;
                const durations = String(prod.duration).split('\n');
                const prices = String(prod.price).split('\n');
                
                let optionsHtml = '';
                durations.forEach((dur, i) => {
                    if(dur.trim() !== '') {
                        let price = prices[i] ? prices[i].trim() : prices[0].trim();
                        optionsHtml += `<option value="${price}" data-dur="${dur.trim()}">${dur.trim()}</option>`;
                    }
                });

                grid.innerHTML += `
                    <div class="card">
                        <div class="img-box">
                            <img src="${prod.image}" alt="Product">
                            ${!isActive ? `<div class="sold-out-overlay"><div class="sold-out-stamp">نفذت الكمية</div></div>` : ''}
                        </div>
                        <div class="prod-title">${prod.name}</div>
                        <select class="variant-select" id="sel-${prod.id}" onchange="updatePrice('${prod.id}')" ${!isActive ? 'disabled' : ''}>
                            ${optionsHtml}
                        </select>
                        <div class="price-row">
                            <div class="btn-add" onclick="${isActive ? `addToCart('${prod.id}')` : ''}" style="${!isActive ? 'opacity:0.3; cursor:not-allowed;' : ''}">
                                <i class="fas fa-plus"></i>
                            </div>
                            <div class="price-tag" id="price-${prod.id}">${prices[0]} دج</div>
                        </div>
                    </div>
                `;
            });
        }

        function updatePrice(id) {
            const select = document.getElementById(`sel-${id}`);
            document.getElementById(`price-${id}`).innerText = select.value + " دج";
        }

        // إضافة للسلة (النسخة المصححة)
        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            if(!prod) return;

            const select = document.getElementById(`sel-${id}`);
            const price = parseInt(select.value);
            const duration = select.options[select.selectedIndex].getAttribute('data-dur');
            
            const key = `${id}-${duration}`;
            let item = cart.find(x => x.key === key);
            
            if(item) { item.qty++; } 
            else { cart.push({ key, name: prod.name, duration, price, qty: 1 }); }
            
            updateCartUI();
            
            // اهتزاز خفيف للزر
            const cartBtn = document.querySelector('.nav-cart-btn');
            cartBtn.style.transform = 'scale(1.2)';
            setTimeout(() => cartBtn.style.transform = 'scale(1)', 200);
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            baseTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            calcTotal();
            
            const list = document.getElementById('cartItems');
            if(cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#9ca3af;">السلة فارغة</p>';
            } else {
                list.innerHTML = cart.map((i, idx) => `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:8px;">
                        <div>
                            <div style="font-weight:bold; color:#fff;">${i.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-sub);">${i.duration} - ${i.price} دج</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="color:var(--primary); font-weight:bold;">x${i.qty}</span>
                            <button onclick="cart.splice(${idx}, 1); updateCartUI();" style="background:none; border:none; color:#ef4444; font-size:1.1rem;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function calcTotal() {
            const method = document.getElementById('payMethod').value;
            const flexyAlert = document.getElementById('alertFlexy');
            const cryptoAlert = document.getElementById('alertCrypto');
            const details = document.getElementById('payDetails');
            
            let finalTotal = baseTotal;
            flexyAlert.style.display = 'none';
            cryptoAlert.style.display = 'none';

            if(method === 'flexy') {
                finalTotal = Math.ceil(baseTotal * 1.20);
                flexyAlert.style.display = 'block';
                details.innerHTML = `رقم الفليكسي: <b>${ADMIN_PHONE}</b>`;
            } else if(method === 'ccp') {
                details.innerHTML = `CCP: <b>00799999002892667082</b><br>Name: M. MEHDI YOUCEF CHERIF`;
            } else if(method === 'binance') {
                cryptoAlert.style.display = 'block';
                details.innerHTML = `Binance ID: <b>534110294</b>`;
            } else if(method === 'redotpay') {
                cryptoAlert.style.display = 'block';
                details.innerHTML = `RedotPay ID: <b>1972824467</b>`;
            }

            document.getElementById('cartTotal').innerText = finalTotal + " دج";
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; updateCartUI(); }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        // إرسال الطلب لواتساب
        function checkout() {
            const phone = document.getElementById('clientPhone').value;
            const receipt = document.getElementById('receiptLink').value || "لم يتم إرفاق رابط";
            const method = document.getElementById('payMethod').value;
            const total = document.getElementById('cartTotal').innerText;

            if(cart.length === 0) { alert('السلة فارغة!'); return; }
            if(phone.length < 9) { alert('يرجى إدخال رقم هاتف صحيح!'); return; }
            
            let msg = `🛒 *طلب جديد من الموقع*\n\n📦 *المنتجات:*\n`;
            cart.forEach(i => msg += `▪️ ${i.name} (${i.duration}) ✖️ ${i.qty}\n`);
            
            msg += `\n💳 *الدفع:* ${method.toUpperCase()}\n`;
            msg += `💰 *الإجمالي:* ${total}\n`;
            msg += `📱 *الهاتف:* ${phone}\n`;
            msg += `🧾 *الوصل:* ${receipt}`;
            
            window.location.href = `https://wa.me/${ADMIN_PHONE}?text=${encodeURIComponent(msg)}`;
        }

        // الآدمن
        function renderAdmin() {
            document.getElementById('adminTableBody').innerHTML = products.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.active !== false ? '🟢' : '🔴'}</td>
                    <td>${String(p.price).split('\n')[0]}</td>
                </tr>
            `).join('');
        }

        fetchProducts();
    </script>
</body>
</html>
